<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">Library</span>
      </div>
      <nav>
        <button class="nav-btn active" data-view="books">All Books</button>
        <button class="nav-btn" data-view="shelves">Shelves</button>
      </nav>
    </div>
  </header>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat"><span id="stat-total">0</span><label>Total</label></div>
    <div class="stat"><span id="stat-read">0</span><label>Read</label></div>
    <div class="stat"><span id="stat-reading">0</span><label>Reading</label></div>
    <div class="stat"><span id="stat-want">0</span><label>Want to Read</label></div>
  </div>

  <!-- ── Books View ── -->
  <main id="view-books" class="view active">
    <div class="toolbar">
      <input id="search" type="text" placeholder="Search by title or author…" />
      <select id="filter-status">
        <option value="">All statuses</option>
        <option value="want-to-read">Want to Read</option>
        <option value="reading">Reading</option>
        <option value="read">Read</option>
      </select>
      <button class="btn-primary" id="open-add-book">+ Add Book</button>
    </div>
    <div id="books-grid" class="books-grid"></div>
  </main>

  <!-- ── Shelves View ── -->
  <main id="view-shelves" class="view">
    <div class="toolbar">
      <button class="btn-primary" id="open-add-shelf">+ New Shelf</button>
    </div>
    <div id="shelves-list" class="shelves-list"></div>
    <div id="shelf-detail" class="shelf-detail hidden">
      <button class="back-btn" id="back-to-shelves">← All Shelves</button>
      <h2 id="shelf-detail-name"></h2>
      <p id="shelf-detail-desc"></p>
      <div id="shelf-books-grid" class="books-grid"></div>
    </div>
  </main>

  <!-- ── Modal ── -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <button class="modal-close" id="modal-close">✕</button>
      <h3 id="modal-title">Add Book</h3>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
